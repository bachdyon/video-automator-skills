name: Bug report
description: Báo lỗi khi dùng VAS / video-automator-skills
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Cảm ơn bạn đã báo lỗi. Hãy điền đủ thông tin để issue có thể được reproduce nhanh.

  - type: textarea
    id: summary
    attributes:
      label: Lỗi là gì?
      description: Mô tả ngắn gọn lỗi bạn gặp.
      placeholder: "Ví dụ: watcher không index file mới trong raw_assets/..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Cách reproduce
      description: Các bước cụ thể để gặp lỗi.
      placeholder: |
        1. Chạy ...
        2. Thả file vào ...
        3. Mở ...
        4. Thấy lỗi ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Kết quả mong đợi
      placeholder: "Ví dụ: asset được index và xuất hiện trong search."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Kết quả thực tế
      placeholder: "Ví dụ: processed_count không tăng, search không thấy asset."
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Hệ điều hành
      placeholder: "macOS 15.4 / Windows 11 / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: install_method
    attributes:
      label: Cách cài đặt
      placeholder: "Install.command / Install.bat / cài tay"
    validations:
      required: false

  - type: input
    id: ide
    attributes:
      label: IDE / agent đang sử dụng
      placeholder: "Codex / Cursor / Claude Code / VS Code / khác"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model đang sử dụng
      placeholder: "GPT-5 / Claude Sonnet 4.5 / Gemini 2.5 Pro / khác"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Log / lỗi terminal
      description: Dán log liên quan. Không dán API key hoặc secret.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Thông tin thêm
      description: Job ID, file path, skill đang chạy, ảnh chụp màn hình, hoặc ghi chú khác.
