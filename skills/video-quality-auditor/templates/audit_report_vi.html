<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__TITLE__</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; color: #111; }
      h1, h2 { margin: 0 0 12px; }
      .meta { margin-bottom: 16px; padding: 12px; background: #f5f5f7; border-radius: 8px; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
      .error { background: #ffe2e2; color: #9b1c1c; }
      .warning { background: #fff5d6; color: #8a5a00; }
      .info { background: #e6f0ff; color: #1546a0; }
      table { width: 100%; border-collapse: collapse; margin-top: 8px; }
      th, td { border: 1px solid #e5e5e5; padding: 8px; text-align: left; vertical-align: top; }
      th { background: #fafafa; }
      .section { margin-top: 20px; }
      code { background: #f3f3f3; padding: 1px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>__TITLE__</h1>
    <div class="meta">
      <div><strong>Job:</strong> <code>__JOB_ID__</code></div>
      <div><strong>Pass:</strong> __PASS_INDEX__/__MAX_PASSES__</div>
      <div><strong>Kết luận pass:</strong> __PASS_STATUS__</div>
      <div><strong>Generated at:</strong> __GENERATED_AT__</div>
    </div>

    <div class="section">
      <h2>Tóm tắt</h2>
      <p>__SUMMARY_TEXT__</p>
    </div>

    <div class="section">
      <h2>Danh sách lỗi đã phát hiện</h2>
      __FINDINGS_TABLE__
    </div>

    <div class="section">
      <h2>Kế hoạch fix một thể</h2>
      __FIX_PLAN__
    </div>
  </body>
</html>
